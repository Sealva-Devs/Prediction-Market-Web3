# Netlify build configuration for Pledgy frontend
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA: serve index.html for all routes (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Optional: security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
